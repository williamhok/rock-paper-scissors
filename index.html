<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="header">
        <h1>Rock Paper Scissor</h1>
    </div>
    <div class="game">
        <div class="board">
            <div class="round">
                <p>Round:<br>
                    <span class="span" id="round-num"></span>
                </p>
            </div>
            <div class="scores">
                <div class="player">
                    <p>Player:<br>
                        <span class="span" id="player-score"></span>
                    </p>
                </div>
                <div class="computer">
                    <p>Computer:<br>
                        <span class="span" id="computer-score"></span>
                    </p>
                </div>
            </div>
        </div>
        <div class="result">
            <!-- JavaScript -->
        </div>
        <div class="selection">
            <div class="selection-group">
                <button class="btn" id="rock" value="rock">Rock</button>
            </div>
            <div class="selection-group">
                <button class="btn" id="paper" value="paper">Paper</button>
            </div>
            <div class="selection-group">
                <button class="btn" id="scissors" value="scissors">Scissors</button>
            </div>
        </div>
    </div>
    <div class="announcement hidden">
        <h1 id="game-result"></h1>
    </div>
</body>
</html>
