<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="/script.js"></script>
</head>
<body>
    <div class="header">
        <h1>Rock Paper Scissor</h1>
    </div>
    <div class="game">
        <div class="board">
            <div class="round">
                <p>Round:</p>
            </div>
            <div class="scores">
                <div class="player">
                    <p>Player:</p>
                </div>
                <div class="computer">
                    <p>Computer:</p>
                </div>
            </div>
        </div>
        <div class="result">
            <h1></h1>
        </div>
        <div class="selection">
            <div class="selection-group">
                <button>Rock</button>
            </div>
            <div class="selection-group">
                <button>Paper</button>
            </div>
            <div class="selection-group">
                <button>Scissors</button>
            </div>
        </div>
    </div>
</body>
</html>
